name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Deny all warnings in CI
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        if: ${{ !env.ACT }}
        uses: Swatinem/rust-cache@v2
        with:
          key: check

      - name: Check compilation
        run: cargo check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        if: ${{ !env.ACT }}
        uses: Swatinem/rust-cache@v2
        with:
          key: test

      - name: Run unit tests
        run: cargo test --lib

      - name: Run doc tests
        run: cargo test --doc

      - name: Run unit tests (all files)
        run: cargo test --test unit_tests

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        if: ${{ !env.ACT }}
        uses: Swatinem/rust-cache@v2
        with:
          key: clippy

      - name: Run clippy
        run: cargo clippy -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        if: ${{ !env.ACT }}
        uses: Swatinem/rust-cache@v2
        with:
          key: docs

      - name: Build documentation
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  clean-build:
    name: Clean Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Clean build
        run: cargo clean

      - name: Build release
        run: cargo build --release

      - name: Verify binary
        run: ./target/release/k8s-mcp --help

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [check, test, clippy]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        if: ${{ !env.ACT }}
        uses: Swatinem/rust-cache@v2
        with:
          key: integration

      - name: Install kind
        uses: helm/kind-action@v1
        with:
          cluster_name: k8s-mcp-test
          wait: 60s

      - name: Verify kind cluster
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Run integration tests
        run: cargo test --test integration_tests -- --test-threads=1
        env:
          KUBECONFIG: /home/runner/.kube/config

  # Summary job that requires all checks to pass
  ci:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [check, test, clippy, fmt, docs, clean-build, integration]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.check.result }}" != "success" || \
                "${{ needs.test.result }}" != "success" || \
                "${{ needs.clippy.result }}" != "success" || \
                "${{ needs.fmt.result }}" != "success" || \
                "${{ needs.docs.result }}" != "success" || \
                "${{ needs.clean-build.result }}" != "success" || \
                "${{ needs.integration.result }}" != "success" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed!"