name: Release

on:
  release:
    types: [created]

jobs:
  build:
    name: Build ${{ matrix.target }}
    permissions:
      contents: write
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          if [ "${{ matrix.archive }}" = "tar.gz" ]; then
            tar -czvf k8s-mcp-${{ matrix.target }}.tar.gz k8s-mcp
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: k8s-mcp-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/k8s-mcp-${{ matrix.target }}.tar.gz
          retention-days: 1

  finalize:
    name: Upload Release Assets
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz

  publish-crate:
    name: Publish to crates.io
    needs: finalize
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  publish-release:
    name: Publish Release
    needs: [finalize, publish-crate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          BODY="${RELEASE_BODY}

          ---

          📦 Install with cargo: \`cargo install k8s-mcp\`
          🔗 [View on crates.io](https://crates.io/crates/k8s-mcp/${VERSION#v})"
          gh release edit "$VERSION" --draft=false --notes "$BODY"
